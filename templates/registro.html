<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartBite — Crear cuenta</title>
  <link rel="stylesheet" href="/static/registro.css">
</head>
<body>

  <div class="cuadro_blanco">

    <div class="nombre_app">SmartBite</div>
    <p class="texto_gris">Crea tu cuenta para continuar</p>

    <h2 class="titulo_seccion">Registro</h2>

    <form method="POST" action="/registro">
      <div class="cajita">
        <label for="nombre">Nombre completo</label>
        <input type="text" id="nombre" name="nombre" placeholder="Tu nombre completo" required>
      </div>
      <div class="cajita">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="tucorreo@email.com" required>
      </div>
      <div class="cajita">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" placeholder="Mínimo 8 caracteres" required>
      </div>
      <div class="cajita">
        <label for="sucursal">Sucursal</label>
        <select id="sucursal" name="sucursal">
          <option value="Norte">Norte</option>
          <option value="Sur">Sur</option>
          <option value="Centro">Centro</option>
          <option value="El Lago">El Lago</option>
          <option value="Portal">Portal</option>
        </select>
      </div>
      <div class="cajita">
        <label for="rol">Rol</label>
        <select id="rol" name="rol">
          <option value="Administrador">Administrador</option>
          <option value="Analista">Analista</option>
          <option value="Gerente">Gerente</option>
        </select>
      </div>
      <button type="submit" class="boton_naranja">Crear cuenta</button>
    </form>

    <hr class="linea_divisora">
    <p class="texto_link">¿Ya tienes cuenta? <a href="/login">Iniciar sesión</a></p>

  </div>

</body>
</html>
